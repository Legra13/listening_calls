name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 188.227.87.11
          username: root
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            cd /var/www/call-eval
            git pull origin main
            sudo systemctl restart call-eval
            echo "Deployed $(git rev-parse --short HEAD)"
