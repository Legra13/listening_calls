<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — CallReview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --brand-primary: #3A5FC4;
      --brand-navy: #1C2E6B;
      --brand-primary-pale: #EAF0FF;
      --border: #DDE4F3;
    }
    body {
      font-family: 'Open Sans', sans-serif;
      background: linear-gradient(135deg, #EAF0FF 0%, #F4F6FB 60%, #E8EFFF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .login-card {
      width: 380px;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(28, 46, 107, 0.10);
      background: #fff;
    }
    .login-logo {
      width: 48px;
      height: 48px;
      background: var(--brand-primary-pale);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      color: var(--brand-primary);
      font-size: 1.5rem;
    }
    .login-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1A2340;
      margin-bottom: 0.25rem;
    }
    .login-subtitle {
      font-size: 0.8rem;
      color: #8E9BB5;
    }
    .form-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #5C6A85;
    }
    .form-control {
      border-color: var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
    }
    .form-control:focus {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px rgba(58, 95, 196, 0.12);
    }
    .btn-login {
      background-color: var(--brand-primary);
      border-color: var(--brand-primary);
      color: #fff;
      font-weight: 600;
      border-radius: 8px;
      padding: 0.55rem;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .btn-login:hover {
      background-color: #2B4AA8;
      border-color: #2B4AA8;
      color: #fff;
    }
    .entera-badge {
      font-size: 0.72rem;
      color: #8E9BB5;
      text-align: center;
      margin-top: 1.25rem;
    }
  </style>
</head>
<body>
<div class="login-card p-4">
  <div class="login-logo">
    <i class="bi bi-headset"></i>
  </div>
  <div class="text-center mb-4">
    <div class="login-title">CallReview</div>
    <div class="login-subtitle">Инструмент оценки звонков · Entera</div>
  </div>

  {% if flash %}
    <div class="alert alert-{{ flash.category }} py-2 small mb-3" style="border-radius:8px;font-size:0.82rem">
      {{ flash.message }}
    </div>
  {% endif %}

  <form action="/login" method="post">
    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input type="text" name="username" class="form-control" autofocus required placeholder="Введите логин">
    </div>
    <div class="mb-4">
      <label class="form-label">Пароль</label>
      <input type="password" name="password" class="form-control" required placeholder="Введите пароль">
    </div>
    <button type="submit" class="btn btn-login w-100">
      <i class="bi bi-box-arrow-in-right me-1"></i>Войти
    </button>
  </form>

  <div class="entera-badge">© Entera · Внутренний инструмент</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
