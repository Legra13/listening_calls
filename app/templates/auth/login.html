<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — CallReview · Entera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --green:      #00B583;
      --green-light:#0EDA93;
      --navy:       #173D7A;
      --blue:       #356ABB;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Open Sans', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
    }

    /* Левая зелёная колонка */
    .login-side {
      width: 380px;
      flex-shrink: 0;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2.5rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .login-side::before {
      content: '';
      position: absolute;
      bottom: -60px;
      right: -60px;
      width: 220px;
      height: 220px;
      background: rgba(0, 181, 131, 0.15);
      border-radius: 50%;
    }
    .login-side::after {
      content: '';
      position: absolute;
      top: -40px;
      left: -40px;
      width: 160px;
      height: 160px;
      background: rgba(14, 218, 147, 0.10);
      border-radius: 50%;
    }

    /* Лого-иконка: шестигранник Entera */
    .logo-hex {
      width: 70px;
      height: 70px;
      background: var(--green);
      clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      position: relative;
      z-index: 1;
      font-size: 1.9rem;
      color: #fff;
      font-weight: 800;
    }
    .logo-brand {
      font-size: 1.7rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.01em;
      position: relative;
      z-index: 1;
      margin-bottom: 0.3rem;
    }
    .logo-sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .side-divider {
      width: 40px;
      height: 2px;
      background: var(--green);
      margin: 1.25rem 0;
      position: relative;
      z-index: 1;
    }
    .side-tagline {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
      text-align: center;
      position: relative;
      z-index: 1;
      line-height: 1.5;
    }

    /* Правая белая колонка с формой */
    .login-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F4F7FA;
      padding: 2rem;
    }
    .login-form-card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border-radius: 14px;
      padding: 2.25rem 2rem;
      box-shadow: 0 4px 24px rgba(23, 61, 122, 0.10);
      border: 1px solid #E4EBF5;
    }
    .form-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 0.2rem;
    }
    .form-subtitle {
      font-size: 0.8rem;
      color: #8C9BB2;
      margin-bottom: 1.75rem;
    }
    .form-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #5A6A82;
      margin-bottom: 0.3rem;
      display: block;
    }
    .form-control {
      border: 1px solid #DDE5EF;
      border-radius: 8px;
      font-size: 0.875rem;
      padding: 0.55rem 0.85rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: 'Open Sans', sans-serif;
    }
    .form-control:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0, 181, 131, 0.15);
    }
    .btn-login {
      width: 100%;
      padding: 0.6rem;
      background: var(--blue);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: 'Open Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      margin-top: 1.5rem;
    }
    .btn-login:hover {
      background: var(--navy);
      box-shadow: 0 3px 12px rgba(23, 61, 122, 0.28);
    }
    .alert-box {
      padding: 0.6rem 0.85rem;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }
    .alert-danger-custom {
      background: #FDE8E8;
      border: 1px solid #F5B5B5;
      color: #B83030;
    }
    .alert-success-custom {
      background: #E3FAF3;
      border: 1px solid #9EE5D0;
      color: #007A5A;
    }
    .mb-3 { margin-bottom: 1rem; }
    .mb-4 { margin-bottom: 1.25rem; }
  </style>
</head>
<body>

<!-- Левая брендовая колонка -->
<div class="login-side">
  <div class="logo-hex">e</div>
  <div class="logo-brand">Entera</div>
  <div class="logo-sub">Инструмент оценки звонков</div>
  <div class="side-divider"></div>
  <div class="side-tagline">Внутренний сервис<br>для анализа и оценки звонков</div>
</div>

<!-- Правая колонка с формой -->
<div class="login-main">
  <div class="login-form-card">
    <div class="form-title">Добро пожаловать</div>
    <div class="form-subtitle">Войдите, чтобы продолжить работу</div>

    {% if flash %}
      <div class="alert-box {% if flash.category == 'danger' %}alert-danger-custom{% else %}alert-success-custom{% endif %}">
        {{ flash.message }}
      </div>
    {% endif %}

    <form action="/login" method="post">
      <div class="mb-3">
        <label class="form-label">Логин</label>
        <input type="text" name="username" class="form-control" autofocus required placeholder="Введите логин">
      </div>
      <div class="mb-4">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control" required placeholder="Введите пароль">
      </div>
      <button type="submit" class="btn-login">Войти</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
