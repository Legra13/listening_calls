<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CallReview{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/main.css" rel="stylesheet">
  {% block styles %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-semibold" href="/">
      <i class="bi bi-headset me-1"></i>CallReview
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path.startswith('/evaluations') %}active{% endif %}"
             href="/evaluations">
            <i class="bi bi-clipboard-check me-1"></i>Оценки
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path.startswith('/checklists') %}active{% endif %}"
             href="/checklists">
            <i class="bi bi-list-check me-1"></i>Чек-листы
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path.startswith('/reports') %}active{% endif %}"
             href="/reports">
            <i class="bi bi-bar-chart-line me-1"></i>Отчёты
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path.startswith('/users') %}active{% endif %}"
             href="/users">
            <i class="bi bi-people me-1"></i>Пользователи
          </a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-secondary small">
          <i class="bi bi-person-circle me-1"></i>{{ current_user.username }}
        </span>
        <form action="/logout" method="post" class="m-0">
          <button type="submit" class="btn btn-sm btn-outline-secondary">Выйти</button>
        </form>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-3">
  {% if flash %}
    <div class="alert alert-{{ flash.category }} alert-dismissible fade show" role="alert">
      {{ flash.message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function(el) {
      new bootstrap.Tooltip(el, {trigger: 'hover focus'});
    });
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
